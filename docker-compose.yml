services:

  #Postgres Database
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: foodflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  # FastAPI backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file: .env

  #  Next.js frontend  
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"